<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile | Patient</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="glass-card animate-fade-in" style="width: 100%; max-width: 600px; padding: 3rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2.2rem; margin-bottom: 0.5rem;">Complete Your Profile</h2>
                <p>We need a few more details to provide personalized health insights.</p>
            </div>

            <form action="{{ url_for('patient_details') }}" method="POST">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" name="age" class="form-input" required min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select name="gender" class="form-input" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" name="city" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Pincode</label>
                        <input type="text" name="pincode" class="form-input" required pattern="[0-9]{6}">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label>Do you have a caretaker?</label>
                    <div style="display: flex; gap: 2rem; margin-top: 0.5rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" name="wants_caretaker" value="yes" onclick="toggleCaretaker(true)"> Yes
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" name="wants_caretaker" value="no" checked onclick="toggleCaretaker(false)"> No
                        </label>
                    </div>
                </div>

                <div id="caretaker-details" style="display: none; border-top: 1px solid var(--glass-border); padding-top: 1.5rem; margin-top: 1rem;">
                    <h4 style="margin-bottom: 1rem; color: var(--primary);">Caretaker Information</h4>
                    <div class="form-group">
                        <label>Caretaker's Name</label>
                        <input type="text" name="caretaker_name" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>Caretaker's Email</label>
                        <input type="email" name="caretaker_email" class="form-input">
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 2rem; font-size: 1.1rem;">Save and Continue</button>
            </form>
        </div>
    </div>

    <script>
        function toggleCaretaker(show) {
            document.getElementById('caretaker-details').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
